server {
    listen 80;
    server_name _;

    # Redirect /app and /app-legacy to trailing slash (preserve query string)
    location = /app {
        return 301 /app/$is_args$args;
    }
    location = /app-legacy {
        return 301 /app-legacy/$is_args$args;
    }

    # React app (built static files at /app/)
    location /app/ {
        alias /workshop/react_agent/dist/;
        try_files $uri $uri/ /app/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # React legacy app (built static files at /app-legacy/)
    location /app-legacy/ {
        alias /workshop/react_agent/dist-legacy/;
        try_files $uri $uri/ /app-legacy/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Flask API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE: disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Code Editor (existing)
    location / {
        proxy_pass http://localhost:8080/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }
}

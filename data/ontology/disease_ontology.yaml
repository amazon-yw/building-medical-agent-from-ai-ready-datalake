    match_patterns: ["alzheimer|dementia"]
    snomed_codes: ["26929004", "230265002"]
    complications: []
    comorbidities:
      - label: "Hypertension"
        label_ko: "고혈압"
        patterns: ["hypertens"]
        snomed: ["59621000"]
      - label: "Diabetes mellitus"
        label_ko: "당뇨병"
        patterns: ["diabet"]
        snomed: ["44054006"]

  - anchor: "osteoarthritis"
    label: "Osteoarthritis"
    label_ko: "골관절염"
    icd10: "M15-M19"
    match_patterns: ["osteoarthritis|osteoarth"]
    snomed_codes: ["239873007", "239872002", "201834006"]
    complications:
      - label: "Back pain"
        label_ko: "요통"
        patterns: ["back pain|low back"]
    comorbidities:
      - label: "Obesity"
        label_ko: "비만"
        patterns: ["obesity|body mass index 30"]
        snomed: ["162864005"]

  - anchor: "anxiety_depression"
    label: "Anxiety and depressive disorders"
    label_ko: "불안·우울 장애"
    icd10: "F30-F48"
    match_patterns: ["anxiety|depress|panic"]
    snomed_codes: ["80583007", "370143000", "48694002"]
    complications: []
    comorbidities:
      - label: "Chronic pain"
        label_ko: "만성 통증"
        patterns: ["chronic pain"]
        snomed: ["82423001"]
